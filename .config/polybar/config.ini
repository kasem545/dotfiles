;==========================================================
;
;   POLYBAR CONFIG - Kali Linux XFCE Edition
;   Full Customization Setup
;
;==========================================================

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[settings]
screenchange-reload = true
pseudo-transparency = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;==========================================================
;   BAR CONFIGURATION
;==========================================================

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 30
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = ${colors.primary}

border-size = 0
border-color = ${colors.border}

padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

; Font configuration
font-0 = "JetBrainsMono Nerd Font:size=11;2"
font-1 = "JetBrainsMono Nerd Font:size=16;3"
font-2 = "Material Icons:size=12;3"
font-3 = "Font Awesome 6 Free:style=Solid:size=10;2"
font-4 = "Font Awesome 6 Brands:size=10;2"

; Module arrangement
modules-left = launcher workspaces xwindow
modules-center = date
modules-right = tun0 eth network filesystem memory cpu pulseaudio powermenu


; Window manager settings
wm-restack = generic
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
