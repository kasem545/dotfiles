;==========================================================
;
;   POLYBAR MODULES - Complete Module Definitions
;
;==========================================================

;==========================================================
;            LAUNCHER
;==========================================================

[module/launcher]
type = custom/text
format = <label>
label = 
label-foreground = ${colors.blue}
label-padding = 1
click-left = xfce4-appfinder &
click-right = xfce4-popup-whiskermenu &

;==========================================================
;            WORKSPACES
;==========================================================

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = false
enable-click = true
enable-scroll = true

icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-default = 

format = <label-state>
label-monitor = %name%

label-active = %icon%
label-active-foreground = ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 2

label-occupied = %icon%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.background-alt}
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

;==========================================================
;            WINDOW TITLE
;==========================================================

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foreground-alt}
label-padding = 1

;==========================================================
;            DATE & TIME
;==========================================================

[module/date]
type = internal/date
interval = 1

date = %A, %d %B %Y
time = %H:%M:%S

label =  %date%   %time%
label-foreground = ${colors.foreground}
label-padding = 1

;==========================================================
;            CPU
;==========================================================

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 CPU "
format = <label> <ramp-coreload>
format-prefix-foreground = ${colors.cyan}

label = %percentage:2%%
label-foreground = ${colors.cyan}

ramp-coreload-spacing = 1
ramp-coreload-0 = ▁
ramp-coreload-1 = ▂
ramp-coreload-2 = ▃
ramp-coreload-3 = ▄
ramp-coreload-4 = ▅
ramp-coreload-5 = ▆
ramp-coreload-6 = ▇
ramp-coreload-7 = █
ramp-coreload-0-foreground = ${colors.green}
ramp-coreload-1-foreground = ${colors.green}
ramp-coreload-2-foreground = ${colors.green}
ramp-coreload-3-foreground = ${colors.cyan}
ramp-coreload-4-foreground = ${colors.cyan}
ramp-coreload-5-foreground = ${colors.yellow}
ramp-coreload-6-foreground = ${colors.orange}
ramp-coreload-7-foreground = ${colors.red}

;==========================================================
;            MEMORY
;==========================================================

[module/memory]
type = internal/memory
interval = 2
format-prefix = " RAM "
format = <label> <bar-used>
format-prefix-foreground = ${colors.purple}

label = %percentage_used:2%%
label-foreground = ${colors.purple}

bar-used-indicator =
bar-used-width = 10
bar-used-foreground-0 = ${colors.success}
bar-used-foreground-1 = ${colors.success}
bar-used-foreground-2 = ${colors.warning}
bar-used-foreground-3 = ${colors.alert}
bar-used-fill = ▐
bar-used-empty = ▐
bar-used-empty-foreground = ${colors.disabled}

;==========================================================
;            FILESYSTEM
;==========================================================

[module/filesystem]
type = internal/fs
interval = 30

mount-0 = /

format-mounted = <label-mounted>
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.yellow}

label-mounted = %mountpoint%: %percentage_used%%
label-mounted-foreground = ${colors.yellow}

format-unmounted = <label-unmounted>
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

;==========================================================
;            NETWORK
;==========================================================

[module/network]
type = internal/network
interface-type = wired
interval = 3

; For WiFi, change interface-type to wireless
; interface-type = wireless

format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.green}

label-connected = %{F#9ece6a} %downspeed%%{F-}  %{F#7dcfff} %upspeed%%{F-}
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰆂 "
format-disconnected-prefix-foreground = ${colors.alert}

label-disconnected = Disconnected
label-disconnected-foreground = ${colors.disabled}

;==========================================================
;            PULSEAUDIO
;==========================================================

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󱄠 VOL "
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume> <bar-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = "MUTE "
format-muted-prefix-foreground = ${colors.alert}
label-muted = Muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.blue}

bar-volume-width = 10
bar-volume-foreground-0 = ${colors.blue}
bar-volume-foreground-1 = ${colors.blue}
bar-volume-foreground-2 = ${colors.blue}
bar-volume-foreground-3 = ${colors.blue}
bar-volume-foreground-4 = ${colors.blue}
bar-volume-foreground-5 = ${colors.warning}
bar-volume-foreground-6 = ${colors.alert}
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 1
bar-volume-fill = ─
bar-volume-fill-font = 1
bar-volume-empty = ─
bar-volume-empty-font = 1
bar-volume-empty-foreground = ${colors.disabled}

click-right = pavucontrol &

;==========================================================
;   OPTIONAL MODULES (Disabled by default for VM)
;   To enable: Add module name to modules-right in config.ini
;   Note: These may not work in VMs without hardware support
;==========================================================

;==========================================================
;            BATTERY
;==========================================================

[module/battery]
type = internal/battery

full-at = 99
battery = BAT0
adapter = AC

poll-interval = 5

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.success}
label-full = %percentage%%
label-full-foreground = ${colors.foreground}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.yellow}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.success}
animation-charging-framerate = 750

;==========================================================
;            TEMPERATURE
;==========================================================

; NOTE: Check your thermal zone with: ls /sys/class/thermal/
; If thermal_zone0 doesn't exist, try thermal_zone1 or thermal_zone2

[module/temperature]
type = internal/temperature
interval = 2

thermal-zone = 0
warn-temperature = 70
units = true

format = <ramp> <label>
label = %temperature-c%
label-foreground = ${colors.foreground}

format-warn = <ramp> <label-warn>
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 
ramp-foreground = ${colors.orange}

;==========================================================
;            POWER MENU
;==========================================================

[module/powermenu]
type = custom/menu

expand-right = false

format-spacing = 1
format-foreground = ${colors.foreground}
format-background = ${colors.background}

label-open = 
label-open-foreground = ${colors.alert}
label-close = 
label-close-foreground = ${colors.success}
label-separator = |
label-separator-foreground = ${colors.disabled}

; Shutdown
menu-0-0 = 
menu-0-0-exec = systemctl poweroff
menu-0-0-foreground = ${colors.alert}

; Reboot
menu-0-1 = 
menu-0-1-exec = systemctl reboot
menu-0-1-foreground = ${colors.warning}

; Logout
menu-0-2 = 
menu-0-2-exec = xfce4-session-logout
menu-0-2-foreground = ${colors.primary}

; Lock
menu-0-3 = 
menu-0-3-exec = xflock4
menu-0-3-foreground = ${colors.yellow}

;==========================================================
;            EXTRA MODULES
;==========================================================

[module/keyboard]
type = internal/xkeyboard
format = <label-layout> <label-indicator>
format-prefix = " "
format-prefix-foreground = ${colors.blue}
label-layout = %layout%
label-indicator-on = %name%
label-indicator-on-foreground = ${colors.primary}

[module/backlight]
type = internal/backlight
card = intel_backlight
format = <ramp> <label>
label = %percentage%%
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.yellow}

;==========================================================
;            NETWORK INTERFACE MODULES
;==========================================================

[module/tun0]
type = custom/script
exec = ~/.config/polybar/scripts/tun0.sh
interval = 3
click-left = ~/.config/polybar/scripts/tun0-copy.sh

[module/eth]
type = custom/script
exec = ~/.config/polybar/scripts/eth-display.sh
interval = 3
click-left = ~/.config/polybar/scripts/eth-copy.sh
format-foreground = ${colors.green}

